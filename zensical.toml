[project]

site_name = "Nathan Dare"
site_description = "This site is part resume, notebook, and blog."
site_author = "Nathan Dare"
use_directory_urls = true
site_url = "https://nathandare.com/"
repo_url = "https://github.com/NathanDare/docs"
repo_name = "NathanDare/docs"
copyright = """
Nathan Dare &copy; 2026
"""

[project.theme.icon]

repo = "fontawesome/brands/github"




[project.theme]

#favicon = "images/book.ico"
logo = "images/profile_image.png"
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "navigation.footer",
    "navigation.tracking",
    "search.highlight",
    "navigation.tabs",
]


[[project.theme.palette]]

scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"


[[project.theme.palette]]

scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[[project.nav]]

Home = "index.md"


[[project.nav]]

Docs = [
  { "Intel QAT with HAProxy" = "docs/intel-qat-haproxy.md" },
  { "Get started" = "docs/get-started.md" },
  { "Markdown in 5min" = "docs/markdown.md" },
]

[[project.extra.social]]

icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/nathan-dare/"
name = "nathan-dare on LinkedIn"


[[project.extra.social]]

icon = "fontawesome/brands/github"
link = "https://github.com/NathanDare"
name = "NathanDare on GitHub"


[project.extra.analytics]
provider = "google"
property = "G-13PMN87X8Y"